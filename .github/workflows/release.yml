name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: ariadne-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: ariadne-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: ariadne-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: ariadne-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: ariadne-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARTIFACT: ${{ matrix.artifact }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          go build -ldflags="-s -w -X main.version=${REF_NAME}" \
            -o "${ARTIFACT}" ./cmd/ariadne
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Generate checksums
        run: |
          cd dist
          find . -type f | sort | xargs sha256sum > sha256sums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*
            dist/sha256sums.txt
